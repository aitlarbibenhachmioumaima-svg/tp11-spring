<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home - FSTG Security</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-5">
<div class="container border border-secondary p-4 rounded">
    <h1>Bienvenue, <span th:text="${#authentication.name}" class="text-info">User</span> !</h1>
    <hr>
    <p>Statut : <span class="badge bg-success">Connecté via MySQL</span></p>
    <p>Vos rôles : <span th:text="${#authentication.authorities}">Rôles</span></p>

    <div class="mt-4">
        <a th:href="@{/admin/dashboard}" class="btn btn-outline-warning">Accès Admin</a>
        <a th:href="@{/user/dashboard}" class="btn btn-outline-info">Accès User</a>
        <form th:action="@{/logout}" method="post" class="d-inline ms-3">
            <button type="submit" class="btn btn-danger">Déconnexion</button>
        </form>
    </div>
</div>
</body>
</html>
