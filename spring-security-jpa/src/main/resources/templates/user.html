<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard - FSTG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; height: 100vh; display: flex; align-items: center; }
        .user-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 5px solid #38bdf8;
            padding: 30px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 user-card">
            <h1 class="text-info">Espace Utilisateur</h1>
            <p class="lead">Bienvenue sur votre tableau de bord, <span th:text="${#authentication.name}"></span>.</p>
            <hr class="bg-secondary">
            <div class="alert alert-info bg-dark text-info border-info">
                <strong>Accès autorisé :</strong> Vous êtes connecté avec le rôle <code>ROLE_USER</code>.
            </div>
            <div class="mt-4">
                <a th:href="@{/home}" class="btn btn-outline-info">Retour à l'accueil</a>
                <form th:action="@{/logout}" method="post" class="d-inline ms-2">
                    <button type="submit" class="btn btn-danger">Se déconnecter</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
